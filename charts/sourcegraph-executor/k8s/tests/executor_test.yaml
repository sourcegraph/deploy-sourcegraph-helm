suite: executor
templates:
  - executor.Deployment.yaml
  - executor.Service.yaml
  - executor.ConfigMap.yaml
tests:
  - it: should render the Deployment, Service, ConfigMap if executor is enabled
    set:
      executor:
        queueName: "test"
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: executor-test
        template: executor.Deployment.yaml
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: executor-test
        template: executor.Service.yaml
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: executor-test
        template: executor.ConfigMap.yaml

  - it: should render default containerSecurityContext with privileged false
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: false

  - it: should render custom containerSecurityContext
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
        containerSecurityContext:
          privileged: true
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            privileged: true
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false

  - it: should render podSecurityContext when set
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
        podSecurityContext:
          fsGroup: 2000
          runAsUser: 1000
          runAsGroup: 3000
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            fsGroup: 2000
            runAsUser: 1000
            runAsGroup: 3000

  - it: should fall back to legacy securityContext fields when podSecurityContext is empty
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
        podSecurityContext: {}
        securityContext:
          fsGroup: 1001
          runAsUser: 1001
          runAsGroup: 1001
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            fsGroup: 1001
            runAsUser: 1001
            runAsGroup: 1001

  - it: should not render legacy securityContext fields when podSecurityContext is set
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
        podSecurityContext:
          fsGroup: 2000
        securityContext:
          fsGroup: 1001
          runAsUser: 1001
          runAsGroup: 1001
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2000
      - isNull:
          path: spec.template.spec.securityContext.runAsUser
      - isNull:
          path: spec.template.spec.securityContext.runAsGroup

  - it: should omit pod securityContext fields not set in legacy securityContext
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
        podSecurityContext: {}
        securityContext:
          fsGroup: 500
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 500
      - isNull:
          path: spec.template.spec.securityContext.runAsUser
      - isNull:
          path: spec.template.spec.securityContext.runAsGroup

  - it: should JSON-encode kubernetesJob.node.tolerations when given a YAML list (issue #349)
    template: executor.ConfigMap.yaml
    set:
      executor:
        queueName: "test"
        kubernetesJob:
          node:
            tolerations:
              - key: foo
                operator: Equal
                value: bar
                effect: NoSchedule
    asserts:
      - equal:
          path: data.EXECUTOR_KUBERNETES_NODE_TOLERATIONS
          value: '[{"effect":"NoSchedule","key":"foo","operator":"Equal","value":"bar"}]'

  - it: should pass through kubernetesJob.node.tolerations when given a pre-encoded JSON string
    template: executor.ConfigMap.yaml
    set:
      executor:
        queueName: "test"
        kubernetesJob:
          node:
            tolerations: '[{"key":"foo","operator":"Equal","value":"bar","effect":"NoSchedule"}]'
    asserts:
      - equal:
          path: data.EXECUTOR_KUBERNETES_NODE_TOLERATIONS
          value: '[{"key":"foo","operator":"Equal","value":"bar","effect":"NoSchedule"}]'

  - it: should render default kubernetesJob.node.tolerations as empty string
    template: executor.ConfigMap.yaml
    set:
      executor:
        queueName: "test"
    asserts:
      - equal:
          path: data.EXECUTOR_KUBERNETES_NODE_TOLERATIONS
          value: ""
