suite: executor
templates:
  - executor.Deployment.yaml
  - executor.Service.yaml
  - executor.ConfigMap.yaml
  - executor.PersistentVolumeClaim.yaml
  - executor.CiliumNetworkPolicy.yaml
tests:
  - it: should render the Deployment, Service, ConfigMap, PVC if executor is enabled
    set:
      executor:
        queueName: "test"
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: executor-test
        template: executor.Deployment.yaml
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: executor-test
        template: executor.Service.yaml
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: executor-test
        template: executor.ConfigMap.yaml
      - containsDocument:
          kind: PersistentVolumeClaim
          apiVersion: v1
          name: sg-executor-test
        template: executor.PersistentVolumeClaim.yaml                

  - it: should render default containerSecurityContext with privileged false
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: false

  - it: should render custom containerSecurityContext
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
        containerSecurityContext:
          privileged: true
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            privileged: true
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false

  - it: should render podSecurityContext when set
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
        podSecurityContext:
          fsGroup: 2000
          runAsUser: 1000
          runAsGroup: 3000
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            fsGroup: 2000
            runAsUser: 1000
            runAsGroup: 3000

  - it: should fall back to legacy securityContext fields when podSecurityContext is empty
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
        podSecurityContext: {}
        securityContext:
          fsGroup: 1001
          runAsUser: 1001
          runAsGroup: 1001
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            fsGroup: 1001
            runAsUser: 1001
            runAsGroup: 1001

  - it: should not render legacy securityContext fields when podSecurityContext is set
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
        podSecurityContext:
          fsGroup: 2000
        securityContext:
          fsGroup: 1001
          runAsUser: 1001
          runAsGroup: 1001
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2000
      - isNull:
          path: spec.template.spec.securityContext.runAsUser
      - isNull:
          path: spec.template.spec.securityContext.runAsGroup

  - it: should omit pod securityContext fields not set in legacy securityContext
    template: executor.Deployment.yaml
    set:
      executor:
        queueName: "test"
        podSecurityContext: {}
        securityContext:
          fsGroup: 500
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 500
      - isNull:
          path: spec.template.spec.securityContext.runAsUser
      - isNull:
          path: spec.template.spec.securityContext.runAsGroup

  - it: should render CiliumNetworkPolicy deny guards when enabled
    template: executor.CiliumNetworkPolicy.yaml
    set:
      executor:
        queueNames:
          - batches
          - codeintel
        namespace: executor-jobs
        ciliumNetworkPolicy:
          enabled: true
          sourcegraphNamespace: sourcegraph
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: apiVersion
          value: cilium.io/v2
        documentIndex: 0
      - equal:
          path: kind
          value: CiliumNetworkPolicy
        documentIndex: 0
      - equal:
          path: metadata.name
          value: executor-batches-codeintel-controller-egress-deny
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        documentIndex: 0
      - equal:
          path: spec.enableDefaultDeny.egress
          value: false
        documentIndex: 0
      - equal:
          path: spec.endpointSelector.matchLabels.app
          value: executor-batches-codeintel
        documentIndex: 0
      - equal:
          path: apiVersion
          value: cilium.io/v2
        documentIndex: 1
      - equal:
          path: kind
          value: CiliumNetworkPolicy
        documentIndex: 1
      - equal:
          path: metadata.name
          value: executor-batches-codeintel-jobs-egress-deny
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: executor-jobs
        documentIndex: 1
      - equal:
          path: spec.endpointSelector.matchExpressions
          value:
            - key: sourcegraph/job-id
              operator: Exists
            - key: sourcegraph/run-id
              operator: Exists
        documentIndex: 1
      - equal:
          path: spec.egressDeny[0].toEndpoints[0].matchExpressions[0]
          value:
            key: io.kubernetes.pod.namespace
            operator: In
            values:
              - sourcegraph
        documentIndex: 1
