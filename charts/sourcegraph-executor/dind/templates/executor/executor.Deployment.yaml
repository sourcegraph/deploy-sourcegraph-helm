{{- if .Values.queues }}
{{- range .Values.queues }}
{{- $queue := . }}
{{- include "executor.validateEnv" (list $.Values.executor.env "executor.env") }}
{{- include "executor.validateEnv" (list ($queue.env | default dict) (printf "queues[%s].env" $queue.name)) }}
{{- $mergedEnv := mergeOverwrite (deepCopy $.Values.executor.env) ($queue.env | default dict) }}
{{- $replicaCount := ($queue.replicaCount | default $.Values.executor.replicaCount) }}
{{- $resources := ($queue.resources | default $.Values.executor.resources) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: executor-{{ $queue.name }}
  annotations:
    description: Runs sourcegraph executors
    kubectl.kubernetes.io/default-container: executor
  labels:
    {{- include "sourcegraph.labels" $ | nindent 4 }}
    {{- if $.Values.executor.labels }}
      {{- toYaml $.Values.executor.labels | nindent 4 }}
    {{- end }}
    app: executor-{{ $queue.name }}
    deploy: sourcegraph
    sourcegraph-resource-requires: no-cluster-admin
    app.kubernetes.io/component: executor
spec:
  selector:
    matchLabels:
      {{- include "sourcegraph.selectorLabels" $ | nindent 6 }}
      app: executor-{{ $queue.name }}
  minReadySeconds: 10
  replicas: {{ $replicaCount }}
  revisionHistoryLimit: 10
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: executor
      {{- if $.Values.sourcegraph.podAnnotations }}
      {{- toYaml $.Values.sourcegraph.podAnnotations | nindent 8 }}
      {{- end }}
      {{- if $.Values.executor.podAnnotations }}
      {{- toYaml $.Values.executor.podAnnotations | nindent 8 }}
      {{- end }}
      labels:
      {{- include "sourcegraph.selectorLabels" $ | nindent 8 }}
      {{- if $.Values.sourcegraph.podLabels }}
      {{- toYaml $.Values.sourcegraph.podLabels | nindent 8 }}
      {{- end }}
      {{- if $.Values.executor.podLabels }}
      {{- toYaml $.Values.executor.podLabels | nindent 8 }}
      {{- end }}
        app: executor-{{ $queue.name }}
        deploy: sourcegraph
        sourcegraph-resource-requires: no-cluster-admin
        app.kubernetes.io/component: executor
    spec:
      containers:
        - name: executor
          image: {{ include "sourcegraph.image" (list $ "executor") }}
          imagePullPolicy: {{ $.Values.sourcegraph.image.pullPolicy }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-debug
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http-debug
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 5
          ports:
            - name: http-debug
              containerPort: 8080
          terminationMessagePolicy: FallbackToLogsOnError
          env:
            - name: EXECUTOR_FRONTEND_URL
              value: {{ $.Values.executor.frontendUrl | quote }}
            - name: EXECUTOR_FRONTEND_PASSWORD
              {{- if $.Values.executor.frontendExistingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.executor.frontendExistingSecret }}
                  key: EXECUTOR_FRONTEND_PASSWORD
              {{- else }}
              value: {{ $.Values.executor.frontendPassword | quote }}
              {{- end }}
            - name: EXECUTOR_QUEUE_NAME
              value: {{ $queue.name | quote }}
            - name: SRC_LOG_LEVEL
              value: {{ $.Values.executor.log.level | quote }}
            - name: SRC_LOG_FORMAT
              value: {{ $.Values.executor.log.format | quote }}
            - name: EXECUTOR_MAXIMUM_NUM_JOBS
              value: {{ $.Values.executor.maximumNumJobs | quote }}
            - name: EXECUTOR_MAXIMUM_RUNTIME_PER_JOB
              value: {{ $.Values.executor.maximumRuntimePerJob | quote }}
            - name: EXECUTOR_DOCKER_ADD_HOST_GATEWAY
              value: {{ $.Values.executor.dockerAddHostGateway | quote }}
            - name: EXECUTOR_KEEP_WORKSPACES
              value: {{ $.Values.executor.debug.keepWorkspaces | quote }}
            - name: EXECUTOR_USE_FIRECRACKER
              value: "false"
            - name: EXECUTOR_HEALTH_SERVER_ADDR
              value: ":8080"
            - name: EXECUTOR_JOB_NUM_CPUS
              value: "0"
            - name: EXECUTOR_JOB_MEMORY
              value: "0"
            - name: DOCKER_HOST
              value: tcp://localhost:2375
            - name: TMPDIR
              value: /scratch
            - name: EXECUTOR_USE_KUBERNETES
              value: "false"
            {{- range $name, $item := $mergedEnv }}
            - name: {{ $name }}
              {{- $item | toYaml | nindent 14 }}
            {{- end }}
          volumeMounts:
            - mountPath: /scratch
              name: executor-scratch
          {{- with $resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: dind
          image: "{{ $.Values.dind.image.registry}}/{{ $.Values.dind.image.repository}}:{{ $.Values.dind.image.tag}}"
          imagePullPolicy: {{ $.Values.sourcegraph.image.pullPolicy }}
          securityContext:
            privileged: true
          command:
            - 'dockerd'
            - '--tls=false'
            - '--mtu=1200'
            - '--registry-mirror=http://private-docker-registry:5000'
            - '--host=tcp://0.0.0.0:2375'
          livenessProbe:
            tcpSocket:
              port: 2375
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 2375
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
          ports:
            - containerPort: 2375
              protocol: TCP
          volumeMounts:
            - mountPath: /scratch
              name: executor-scratch
            - mountPath: /etc/docker/daemon.json
              subPath: daemon.json
              name: docker-config
      enableServiceLinks: false
      {{- with $.Values.sourcegraph.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.sourcegraph.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with include "sourcegraph.priorityClassName" (list $ "executor") | trim }}{{ . | nindent 6 }}{{- end }}
      {{- with $.Values.sourcegraph.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.sourcegraph.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: executor-scratch
          emptyDir: {}
        - name: docker-config
          configMap:
            defaultMode: 420
            name: docker-config
{{- end }}
{{- else if .Values.executor.enabled }}
{{- include "executor.validateEnv" (list .Values.executor.env "executor.env") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "executor.name" . }}
  annotations:
    description: Runs sourcegraph executors
    kubectl.kubernetes.io/default-container: executor
  labels:
    {{- include "sourcegraph.labels" . | nindent 4 }}
    {{- if .Values.executor.labels }}
      {{- toYaml .Values.executor.labels | nindent 4 }}
    {{- end }}
    {{- include "executor.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "sourcegraph.selectorLabels" . | nindent 6 }}
      app: {{ include "executor.name" . }}
  minReadySeconds: 10
  replicas: {{ .Values.executor.replicaCount }}
