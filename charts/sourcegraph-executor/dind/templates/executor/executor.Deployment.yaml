{{- if .Values.queues }}
{{- range .Values.queues }}
{{- include "executor.validateEnv" (list $.Values.executor.env "executor.env") }}
{{- include "executor.validateEnv" (list (.env | default dict) (printf "queues[%s].env" .name)) }}
{{- include "executor.deployment" (dict
    "root"        $
    "name"        (printf "executor-%s" .name)
    "queueName"   .name
    "queueNames"  (list)
    "replicaCount" (.replicaCount | default $.Values.executor.replicaCount)
    "resources"   (.resources | default $.Values.executor.resources)
    "env"         (mergeOverwrite (deepCopy $.Values.executor.env) (.env | default dict))
) }}
{{- end }}
{{- else }}
{{- include "executor.validateEnv" (list .Values.executor.env "executor.env") }}
{{- include "executor.deployment" (dict
    "root"        .
    "name"        (include "executor.name" .)
    "queueName"   .Values.executor.queueName
    "queueNames"  .Values.executor.queueNames
    "replicaCount" .Values.executor.replicaCount
    "resources"   .Values.executor.resources
    "env"         .Values.executor.env
) }}
{{- end }}
