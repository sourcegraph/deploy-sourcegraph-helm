{{- if .Values.queues }}
{{- range .Values.queues }}
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/port: "6060"
    sourcegraph.prometheus/scrape: "true"
    {{- if $.Values.executor.serviceAnnotations }}
    {{- toYaml $.Values.executor.serviceAnnotations | nindent 4 }}
    {{- end }}
  labels:
    {{- if $.Values.executor.serviceLabels }}
    {{- toYaml $.Values.executor.serviceLabels | nindent 4 }}
    {{- end }}
    app: executor-{{ .name }}
    deploy: sourcegraph
    sourcegraph-resource-requires: no-cluster-admin
    app.kubernetes.io/component: executor
  name: executor-{{ .name }}
spec:
  ports:
    - name: http-debug
      port: 6060
      targetPort: http-debug
  selector:
    {{- include "sourcegraph.selectorLabels" $ | nindent 4 }}
    app: executor-{{ .name }}
  type: {{ $.Values.executor.serviceType | default "ClusterIP" }}
{{- end }}
{{- else if .Values.executor.enabled }}
apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/port: "6060"
    sourcegraph.prometheus/scrape: "true"
    {{- if .Values.executor.serviceAnnotations }}
    {{- toYaml .Values.executor.serviceAnnotations | nindent 4 }}
    {{- end }}
  labels:
    {{- include "executor.labels" . | nindent 4 }}
    {{- if .Values.executor.serviceLabels }}
    {{- toYaml .Values.executor.serviceLabels | nindent 4 }}
    {{- end }}
  name: executor
spec:
  ports:
    - name: http-debug
      port: 6060
      targetPort: http-debug
  selector:
    {{- include "sourcegraph.selectorLabels" . | nindent 4 }}
    app: {{include "executor.name" . }}
  type: {{ .Values.executor.serviceType | default "ClusterIP" }}
{{- end }}
