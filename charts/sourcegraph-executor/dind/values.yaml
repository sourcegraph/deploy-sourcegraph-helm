# These values are dervied from https://github.com/sourcegraph/deploy-sourcegraph-helm/blob/main/charts/sourcegraph/values.yaml

### Common Configuration ###
sourcegraph:
  image:
    # -- Global docker image tag
    defaultTag: '{{ .Chart.AppVersion }}'
    # -- Global docker image pull policy
    pullPolicy: IfNotPresent
    # -- Global docker image registry or prefix
    repository: index.docker.io/sourcegraph
    # -- When set to true, sourcegraph.image.defaultTag is used as the default defaultTag for all services, instead of service-specific default defaultTags
    useGlobalTagAsDefault: false
  # -- Mount named secrets containing docker credentials
  imagePullSecrets: []
  # -- Add a global label to all resources
  labels: {}
  # -- Set a custom name for the app.kubernetes.io/name annotation
  nameOverride: ""
  # -- Affinity,
  # learn more from the [Kubernetes documentation](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity)
  affinity: {}
  # -- NodeSelector,
  # learn more from the [Kubernetes documentation](https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#nodeselector)
  nodeSelector: {}
  # -- Tolerations,
  # learn more from the [Kubernetes documentation](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/)
  tolerations: []
  # -- Add extra annotations to attach to all pods
  podAnnotations: {}
  # -- Add extra labels to attach to all pods
  podLabels: {}
  # -- Assign a priorityClass to all pods (daemonSets, deployments, and statefulSets)
  priorityClassName: ""


storageClass:
  # -- Enable creation of storageClass. Defaults to Google Cloud Platform. Disable if you have your own existing storage class
  create: false
  # -- Name of the storageClass.
  # Use to customize to the existing storage class name
  name: sourcegraph
  # -- Name of the storageClass provisioner,
  # learn more from the [Kubernetes documentation](https://kubernetes.io/docs/concepts/storage/storage-classes/#provisioner)
  # and consult your cloud provider persistent storage documentation
  provisioner: kubernetes.io/gce-pd
  # -- Value of `type` key in storageClass `parameters`,
  # consult your cloud provider persistent storage documentation
  type: pd-ssd
  # -- Extra parameters of storageClass,
  # consult your cloud provider persistent storage documentation
  parameters: {}
  # -- Persistent volumes topology configuration,
  # learn more from the [Kubernetes documentation](https://kubernetes.io/docs/concepts/storage/storage-classes/#allowed-topologies)
  allowedTopologies: {}

# -- Optional list of queues to deploy as standalone Deployments.
# When set, the single executor Deployment is not rendered.
# Each entry supports:
#   name        (required) — used as the deployment name suffix (executor-<name>)
#   queueName   — sets EXECUTOR_QUEUE_NAME; defaults to name if omitted
#   queueNames  — sets EXECUTOR_QUEUE_NAMES (comma-joined); takes precedence over queueName when set
#   replicaCount, resources, env (merged with executor.env, queue overrides)
queues: []
# - name: codeintel
#   queueName: codeintel
#   replicaCount: 2
#   resources:
#     requests:
#       cpu: "2"
#       memory: 4Gi
#     limits:
#       cpu: "4"
#       memory: 8Gi
#   env: {}
# - name: batches
#   queueName: batches
#   replicaCount: 1
#   resources:
#     requests:
#       cpu: "1"
#       memory: 2Gi
#     limits:
#       cpu: "2"
#       memory: 4Gi
#   env: {}

executor:
  # -- The external URL of the Sourcegraph instance. Required.
  frontendUrl: ""
  # -- The shared secret configured in the Sourcegraph instance site config under executors.accessToken. Required if frontendExistingSecret is not configured.
  frontendPassword: ""
  # -- Name of existing k8s Secret to use for frontend password.
  # The k8s Secret must contain the key EXECUTOR_FRONTEND_PASSWORD matching the site config executors.accessToken value.
  # frontendPassword is ignored if this is set.
  frontendExistingSecret: ""
  # -- The name of the queue to pull jobs from. Possible values: batches and codeintel. Either this or queueNames is required (when not using queues).
  queueName: ""
  # -- The names of multiple queues to pull jobs from. Possible values: batches and codeintel. Either this or queueName is required (when not using queues).
  queueNames: []
  # -- The maximum amount of jobs that can be executed concurrently.
  maximumNumJobs: 10
  # -- The maximum wall time that can be spent on a single job.
  maximumRuntimePerJob: "30m"
  log:
    # -- Possible values are dbug, info, warn, eror, crit.
    level: "warn"
    format: "json"
  # -- Resource requests and limits for the executor container.
  # Each queue can override this with its own resources field.
  resources: {}
  image:
    defaultTag: 6.0.0@sha256:0be94a7c91f8273db10fdf46718c6596340ab2acc570e7b85353806e67a27508
    name: "executor"
  replicaCount: 1
  # -- Extra environment variables to set on the executor container.
  # Must NOT contain managed env vars (EXECUTOR_FRONTEND_URL, EXECUTOR_FRONTEND_PASSWORD,
  # EXECUTOR_QUEUE_NAME, EXECUTOR_QUEUE_NAMES, SRC_LOG_LEVEL, SRC_LOG_FORMAT,
  # EXECUTOR_MAXIMUM_NUM_JOBS, EXECUTOR_MAXIMUM_RUNTIME_PER_JOB,
  # EXECUTOR_DOCKER_ADD_HOST_GATEWAY, EXECUTOR_KEEP_WORKSPACES).
  env: {}

dind:
  image:
    registry: index.docker.io
    repository: docker
    tag: 29.5.3-dind
  # -- Docker daemon configuration passed as daemon.json to the dind sidecar.
  # Learn more from: https://docs.docker.com/reference/cli/dockerd/#on-linux
  daemonConfig:
    insecure-registries:
      - private-docker-registry:5000
  gVisor:
    # -- Enable gVisor sandbox (GKE only). Requires the GKE node pool to have sandbox type set to gvisor.
    # When enabled, sets runtimeClassName: gvisor on executor pods and replaces privileged: true with
    # explicit capabilities — these are intercepted in-sandbox and never granted to the host kernel.
    # See: https://gvisor.dev/docs/tutorials/docker-in-gke-sandbox/
    enabled: false

privateDockerRegistry:
  # -- Whether to deploy the private registry. Only one registry is needed when deploying multiple executors.
  # More information: https://docs.sourcegraph.com/admin/executors/deploy_executors#using-private-registries
  enabled: true
  image:
    registry: index.docker.io
    repository: registry
    tag: 3
  storageSize: 10Gi
