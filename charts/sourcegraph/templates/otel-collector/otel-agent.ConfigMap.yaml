{{ if .Values.openTelemetry.enabled -}}
# Config for the agent pods running as a DaemonSet, which forward data to the gateway pod
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.openTelemetry.agent.name }}
  labels:
    deploy: sourcegraph
    app.kubernetes.io/component: otel-collector
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            # Bind to all interfaces. Since v0.104.0, the collector defaults the OTLP
            # receiver to 127.0.0.1 (CVE-2024-36129 hardening), which silently drops
            # traffic from other pods. See https://opentelemetry.io/blog/2024/hardening-the-collector-one/
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    exporters:
      otlp:
        endpoint: "otel-collector:4317"
        tls:
          insecure: true
        sending_queue:
          num_consumers: 4
          queue_size: 100
        retry_on_failure:
          enabled: true

    # TODO: allow configuring processors through values
    #processors:
    #  batch:
    #  memory_limiter:
    #    # 80% of maximum memory up to 2G
    #    limit_mib: 400
    #    # 25% of limit up to 2G
    #    spike_limit_mib: 100
    #    check_interval: 5s

    extensions:
      health_check:
        endpoint: ":13133"
      zpages:
        endpoint: "localhost:55679"

    service:
      extensions:
        - zpages
        - health_check
      pipelines:
        traces:
          receivers:
            - otlp
          exporters:
            - otlp

{{- end }}
