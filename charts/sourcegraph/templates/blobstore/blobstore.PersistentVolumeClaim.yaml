{{- if .Values.blobstore.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    deploy: sourcegraph
    app.kubernetes.io/component: blobstore
  {{- if .Values.blobstore.storageAnnotations }}
  annotations:
    {{- toYaml .Values.blobstore.storageAnnotations | nindent 4 }}
  {{- end }}
  name: blobstore
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.blobstore.storageSize }}
  storageClassName: {{ .Values.storageClass.name }}
  {{- if .Values.blobstore.volumeName }}
  volumeName: {{ .Values.blobstore.volumeName }}
  {{- end }}
{{- end }}
