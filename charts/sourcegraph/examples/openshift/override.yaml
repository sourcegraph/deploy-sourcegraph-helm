### EXPERIMENTAL ###
# Draft example of a Helm values override file to work with OpenShift
# We do not have an OpenShift cluster to test this on,
# so this example is the result of testing with customers

####################################################################################################
# Deployment specs
####################################################################################################

# Kubernetes
# Using Azure's managed OpenShift service as a Kubernetes platform

# Databases
# Using our Postgres pods

####################################################################################################
# RBAC
####################################################################################################

# Kubernetes Service Accounts
#   If your OpenShift security policy blocks the creation of service accounts,
#       then create one outside of the Helm charts, and provide its name here
#   Frontend and Prometheus use service accounts to query the Kubernetes API for service discovery
#   If Service Discovery is blocked entirely,
#       then we'll need to add some env vars to frontend and worker
x-serviceAccount: &serviceAccount
  create: false
  name: sourcegraph

# Use of "privileged" values in sourcegraph Helm chart
#
#   frontend.privileged (default: true)
#     "privileged" is misnomer here
#     Sourcegraph Helm values config to control how RBAC is handled for the frontend service account
#     true:  Creates a custom, least-privilege, namespaced Role, and binds to it via namespaced RoleBinding,
#            granting only get, list, and watch on endpoints, services, and statefulsets within the same namespace
#     false: Uses the default "view" ClusterRole, and binds to it via namespaced RoleBinding
#            Only use "false" if cluster policy blocks creation of custom Roles
#            Sourcegraph functionality is the same in either case
#
#   prometheus.privileged (default: true)
#     Sourcegraph Helm values config to control how RBAC is handled for the Prometheus service account
#     true:  Creates a ClusterRole + ClusterRoleBinding granting cluster-wide read access to
#            endpoints, nodes, pods, services, and /metrics.
#            Enables kubernetes-apiservers and kubernetes-nodes scrape jobs in the Prometheus config
#            If Executors are deployed in a separate namespace (recommended), then this allows
#            Prometheus to scrape metrics from them
#     false: Binds its ServiceAccount to the built-in "view" ClusterRole (namespace-scoped)
#            Only use "false" if cluster policy blocks creation of custom, cluster-wide Roles

# Creation of RBAC resources in sourcegraph-executor/k8s Helm chart
#
#   executor.configureRbac (default: true)
#     Controls whether the chart creates RBAC resources for the executor.
#     true:  Creates a ServiceAccount (sg-executor), a Role (sg-executor-role), and a RoleBinding.
#            The Role grants create/delete on batch jobs and secrets/PVCs, and get/list/watch on
#            pods/logs — needed for the executor to spawn and manage Kubernetes jobs for batch
#            changes and code intelligence indexing.
#     false: Skips creation of ServiceAccount, Role, and RoleBinding. Use if these are
#            pre-created externally, or if deploying multiple executor releases (RBAC only
#            needs to be created once). The executor Deployment still hardcodes
#            serviceAccountName: sg-executor, so that SA must exist.

####################################################################################################
# Security context configs for OpenShift "Restricted" Security Context Control
####################################################################################################

# OpenShift requires that containers are run as UIDs / GIDs assigned by the OpenShift Project
# This requires that Docker images run without specified UIDs / GIDs,
# however, Sourcegraph's images do have UIDs / GIDs baked in,
# but these UIDs / GIDs can be overridden with specified values
# Set GID and UID in one place, to be reused as needed
x-gid: &gid 1001
x-uid: &uid 1000

# Build reusable chunks, to apply to each service below
# Define containerSecurityContext separately, as some containers take this as an input
x-containerSecurityContext: &containerSecurityContext
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsGroup: *gid
  runAsNonRoot: true
  runAsUser: *uid
  seccompProfile:
    type: RuntimeDefault

x-podSecurityContext: &podSecurityContext
  fsGroup: *gid
  fsGroupChangePolicy: "OnRootMismatch"
  runAsGroup: *gid
  runAsNonRoot: true
  runAsUser: *uid
  seccompProfile:
    type: RuntimeDefault

# Assemble them all together, for most services to use as a whole
x-securityContext: &securityContext
  containerSecurityContext: *containerSecurityContext
  podSecurityContext: *podSecurityContext
  serviceAccount: *serviceAccount

################################################################################
# Sourcegraph-wide configs
################################################################################

sourcegraph:

  image:

    # If using an internal image registry
    repository: registry.example.com/sourcegraph

    # Use the "version" value from
    # deploy-sourcegraph-helm/charts/sourcegraph/Chart.yaml
    # to pull the correct images from your image registry
    defaultTag: "{{ .Chart.AppVersion }}"
    useGlobalTagAsDefault: true

# If your internal image registry requires authentication
# See https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry
#   imagePullSecrets:
#   - name: registry-creds # Kubernetes secret containing the credentials needed to pull images from the registry

# If your OpenShift does not allow the Helm chart to create a storageClass,
# then disable it, and provide the name here
storageClass:
  create: false
  name: "sourcegraph"

################################################################################
# Databases
# Using Sourcegraph's bundled Postgres pods
################################################################################

codeInsightsDB:
  <<: *securityContext
  init:
    containerSecurityContext: *containerSecurityContext

codeIntelDB:
  <<: *securityContext

pgsql:
  <<: *securityContext

# codeIntelDB and pgsql databases use this alpine key for init container security context,
# whereas codeInsightsDB uses its own
alpine:
  containerSecurityContext: *containerSecurityContext

################################################################################
# Migrator
# Used by the sourcegraph chart, and optionally, the sourcegraph-migrator chart
################################################################################

migrator:
  <<: *securityContext

### Use the args list to operate migrator commands if needed for multi-version upgrades
### Available commands can be found at
### https://sourcegraph.com/docs/admin/updates/migrator/migrator-operations#commands

### Drift check
  # args:
  # - drift
  # - --version=v6.12.5040

### Multi-version upgrades
### https://sourcegraph.com/docs/admin/deploy/kubernetes#multi-version-upgrades
#   args:
#   - upgrade
#   - --from=v6.12.5040
#   - --to=v8.0.0

################################################################################
# Frontend and ingress
################################################################################

frontend:
  <<: *securityContext

  # If using an OpenShift Router (CRD) instead of an ingress
  ingress:
    enabled: false

  env:

    # With readOnlyRootFilesystem, this prevents log spam, from trying to write to /home/sourcegraph/site-config.json every second
    # Alternative, if we find the site config escape hatch is needed, we could create and mount a new volume at /home/sourcegraph
    NO_SITE_CONFIG_ESCAPE_HATCH:
      value: "true"

################################################################################
# Core services
################################################################################

blobstore:
  <<: *securityContext

# OpenShift has a max of 1 million files per PVC,
# otherwise attaching the volume to a worker node times out;
# need to horzontally scale pods with large file systems,
# by increasing replicaCount,
# to prevent each volume from growing > 1 million files
gitserver:
  <<: *securityContext
  replicaCount: 1
  storageSize: 1Ti

indexedSearch:
  <<: *securityContext
  replicaCount: 1
  storageSize: 1Ti

indexedSearchIndexer:
  <<: *securityContext

preciseCodeIntel:
  <<: *securityContext
  replicaCount: 1

redisCache:
  <<: *securityContext

redisExporter:
  containerSecurityContext: *containerSecurityContext

redisStore:
  <<: *securityContext

searcher:
  <<: *securityContext

syntacticCodeIntel:
  <<: *securityContext

syntectServer:
  <<: *securityContext

worker:
  <<: *securityContext

################################################################################
# Observability
# TODO: Sort out a delivery mechanism for HTTP traces
################################################################################

# Required for in-app performance metrics and alerts
grafana:
  <<: *securityContext

# Required for in-app performance metrics and alerts
# TODO: Sort out readOnlyRootFilesystem: true
prometheus:
  <<: *securityContext
  privileged: false

# DaemonSet; similar visibility should already be provided by OpenShift, ex. pod restarts, CPU and memory utilization
cadvisor:
  enabled: false

# DaemonSet; similar visibility should already be provided by OpenShift, ex. node performance issues
nodeExporter:
  enabled: false

# DaemonSet, for HTTP traces
openTelemetry:
  enabled: false

# Not needed
sgTestConnection:
  enabled: false

####################################################################################################
# Additional resources
# List of additional Kubernetes manifests to deploy and manage with the Sourcegraph Helm chart
####################################################################################################

extraResources:

  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: sourcegraph-route
      annotations:
        haproxy.router.openshift.io/balance: roundrobin
        haproxy.router.openshift.io/disable_cookies: 'true'
    spec:
      host: sourcegraph.example.com
      to:
        kind: Service
        name: sourcegraph-frontend
        weight: 100
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
      wildcardPolicy: None

####################################################################################################
# sourcegraph-executor/k8s chart
# Reuse the same override.yaml file with this other Helm chart, to reduce duplication
####################################################################################################

# Executors should be deployed in a separate OpenShift project / Kubernetes namespace,
# with network isolation,
# to prevent the Executor job pods from being able to connet to internal APIs

# OpenShift requires that containers are run as UIDs / GIDs assigned by the OpenShift Project
# This requires that Docker images run without specified UIDs / GIDs,
# however, Sourcegraph's images do have UIDs / GIDs baked in,
# but these UIDs / GIDs can be overridden with specified values
# Set GID and UID in one place, to be reused as needed
# NOTE: the UID / GID also needs to be updated in the JSON blob in KUBERNETES_EXECUTOR_CONTAINER_SECURITY_CONTEXT
x-executor-gid: &executor-gid 2001
x-executor-uid: &executor-uid 2000

executor:

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    privileged: false
    readOnlyRootFilesystem: true
    runAsGroup: *executor-gid
    runAsNonRoot: true
    runAsUser: *executor-uid
    seccompProfile:
      type: RuntimeDefault

  extraEnv:

    - name: KUBERNETES_EXECUTOR_CONTAINER_SECURITY_CONTEXT
      value: |-
        {
          "allowPrivilegeEscalation": false,
          "capabilities": {
            "drop": [
              "ALL"
            ]
          },
          "privileged": false,
          "readOnlyRootFilesystem": true,
          "runAsGroup": 2001,
          "runAsNonRoot": true,
          "runAsUser": 2000,
          "seccompProfile": {
            "type": "RuntimeDefault"
          }
        }

  # Must match executors.accessToken in Site Config
  frontendPassword: "REDACTED"

  # TODO: Verify this URL works with namespace isolation network policies
  frontendUrl: "http://sourcegraph-frontend.sourcegraph.svc.cluster.local:30080"

  # Ensure the spawned jobs are not run as root
  kubernetesJob:
    fsGroup: *executor-gid
    runAsGroup: *executor-gid
    runAsUser: *executor-uid

  # Kubernetes namespace to create jobs
  namespace: sourcegraph-executors

  podSecurityContext:
    fsGroup: *executor-gid
    fsGroupChangePolicy: "OnRootMismatch"
    runAsGroup: *executor-gid
    runAsNonRoot: true
    runAsUser: *executor-uid
    seccompProfile:
      type: RuntimeDefault

  queueNames:
    - batches
    - codeintel
